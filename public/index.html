<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>VECTOR PROTOCOL</title>
<style>
  :root { --cyan: #00e5ff; --amber: #ff6a00; --dim: #7ad9e8; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000004;
    font-family: "SF Mono", Menlo, Consolas, "Courier New", monospace; color: var(--cyan);
    -webkit-user-select: none; user-select: none; }
  canvas { display: block; touch-action: none; }

  .hidden { display: none !important; }
  .overlay { position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; text-align: center;
    background: radial-gradient(ellipse at 50% 40%, rgba(0,40,54,0.55), rgba(0,0,4,0.96) 70%);
    z-index: 20; padding: 24px; }
  #logo { font-size: clamp(34px, 7vw, 74px); font-weight: 700; letter-spacing: 0.28em;
    text-shadow: 0 0 18px var(--cyan), 0 0 60px rgba(0,229,255,0.5); }
  #subtitle { color: var(--dim); letter-spacing: 0.22em; font-size: clamp(11px, 2vw, 15px); margin-bottom: 18px; }
  .btns { display: flex; flex-direction: column; gap: 12px; }
  button { font: inherit; letter-spacing: 0.14em; color: var(--cyan); background: rgba(0,20,28,0.6);
    border: 1px solid var(--cyan); padding: 14px 34px; cursor: pointer; min-width: 320px;
    text-shadow: 0 0 8px var(--cyan); box-shadow: 0 0 12px rgba(0,229,255,0.25) inset, 0 0 18px rgba(0,229,255,0.18); }
  button:hover:not(:disabled) { background: rgba(0,50,66,0.8); box-shadow: 0 0 22px rgba(0,229,255,0.5); }
  button:disabled { opacity: 0.28; cursor: default; border-color: var(--dim); }
  #noXR { color: var(--dim); font-size: 12px; min-height: 1.2em; letter-spacing: 0.12em; }
  .hint { color: var(--dim); font-size: 12px; letter-spacing: 0.1em; }
  #menu { overflow-y: auto; justify-content: flex-start; padding-top: 6vh; }
  .menuTools { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
  .menuTools button, .helpTabs button { min-width: 0; padding: 9px 14px; font-size: 11px; }
  #howto { display: none; width: min(780px, 94vw); text-align: left; margin-top: 8px;
    border: 1px solid rgba(0,229,255,0.25); background: rgba(0,10,16,0.68); padding: 14px 16px 18px; }
  #howto.open { display: block; }
  #howTitle { letter-spacing: 0.3em; font-size: 14px; text-shadow: 0 0 10px var(--cyan); margin-bottom: 8px; text-align: center; }
  .helpTabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin: 12px 0; }
  .helpTabs button.active { color: #fff; border-color: #fff; background: rgba(0,90,115,0.55); }
  #helpBody { color: var(--dim); font-size: 12px; line-height: 1.65; letter-spacing: 0.04em; margin: 7px 0; }
  #version { position: absolute; bottom: 14px; color: rgba(122,217,232,0.5); font-size: 11px; letter-spacing: 0.2em; }

  #hud { position: fixed; top: 18px; left: 20px; z-index: 5; display: none; pointer-events: none;
    text-shadow: 0 0 10px var(--cyan); letter-spacing: 0.12em; }
  #enemy { font-size: 20px; color: var(--amber); text-shadow: 0 0 10px var(--amber); }
  #round { font-size: 13px; color: var(--dim); margin: 4px 0; }
  .pipRow { font-size: 22px; }
  #pips { color: var(--cyan); }
  #epips { color: var(--amber); text-shadow: 0 0 10px var(--amber); }
  .pipSep { color: rgba(122,217,232,0.4); font-size: 16px; }
  #discState { font-size: 12px; color: var(--dim); margin-top: 4px; }

  #boostWrap { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    width: 240px; height: 10px; border: 1px solid var(--cyan); display: none; z-index: 5;
    box-shadow: 0 0 12px rgba(0,229,255,0.35); pointer-events: none; }
  #boostFill { height: 100%; width: 100%; background: var(--cyan); box-shadow: 0 0 12px var(--cyan); }

  #crosshair { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    color: rgba(0,229,255,0.85); font-size: 22px; z-index: 5; display: none;
    text-shadow: 0 0 8px var(--cyan); pointer-events: none; }
  #hint { position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
    color: var(--dim); font-size: 12px; letter-spacing: 0.12em; z-index: 5; pointer-events: none; text-align: center; }

  #flash { position: fixed; inset: 0; background: #bff4ff; opacity: 0; pointer-events: none;
    z-index: 15; mix-blend-mode: screen; transition: opacity 60ms linear; }

  #touchUI { position: fixed; inset: 0; z-index: 8; display: none; pointer-events: none; }
  .tbtn { position: absolute; pointer-events: auto; border: 1px solid var(--cyan);
    color: var(--cyan); background: rgba(0,20,28,0.45); border-radius: 50%;
    width: 84px; height: 84px; display: flex; align-items: center; justify-content: center;
    font-size: 13px; letter-spacing: 0.08em; text-shadow: 0 0 8px var(--cyan); }
  .tbtn:active { background: rgba(0,60,80,0.7); }
  #touchUI .disc, #touchUI .cyc { display: none; }
  #touchUI[data-mode="disc"] .disc { display: flex; }
  #touchUI[data-mode="cycle"] .cyc { display: flex; }
  .t-throw { right: 24px; bottom: 96px; width: 104px; height: 104px; }
  .t-guard { right: 148px; bottom: 60px; }
  .t-dash { right: 60px; bottom: 220px; }
  .t-turnL { left: 24px; bottom: 80px; width: 96px; height: 96px; font-size: 26px; }
  .t-turnR { left: 140px; bottom: 80px; width: 96px; height: 96px; font-size: 26px; }
  .t-boost { right: 24px; bottom: 96px; width: 104px; height: 104px; }
  .t-brake { right: 148px; bottom: 60px; }
  .t-pause { right: 18px; top: 18px; width: 52px; height: 52px; border-radius: 10px; }

  #dev { position: fixed; top: 6px; right: 80px; color: #0f0; font: 12px monospace; display: none; z-index: 30; }
  #minimap { position: fixed; top: 18px; right: 18px; width: 205px; height: 205px; display: none;
    z-index: 6; pointer-events: none; border: 2px solid rgba(0,229,255,0.9); border-radius: 3px;
    background: rgba(1,6,12,0.92); box-shadow: 0 0 0 6px rgba(0,8,14,0.78), 0 0 28px rgba(0,229,255,0.42), inset 0 0 18px rgba(0,229,255,0.18); }
</style>
</head>
<body>
<div id="menu" class="overlay">
  <div id="logo"></div>
  <div id="subtitle"></div>
  <div class="btns">
    <button id="btnVR"></button>
    <button id="btnAR"></button>
    <button id="btnDesk"></button>
  </div>
  <div id="noXR"></div>
  <div class="menuTools">
    <button id="btnHow"></button>
    <button id="btnMusic"></button>
  </div>
  <div id="howto">
    <div id="howTitle"></div>
    <div class="helpTabs">
      <button data-help="discVR"></button>
      <button data-help="discAR"></button>
      <button data-help="cycleVR"></button>
      <button data-help="desktop"></button>
    </div>
    <p id="helpBody"></p>
  </div>
  <div id="version"></div>
</div>

<div id="pause" class="overlay hidden">
  <div id="pauseTitle" style="font-size:34px; letter-spacing:0.3em; text-shadow:0 0 16px var(--cyan);"></div>
  <button id="btnResume"></button>
  <button id="btnHub"></button>
</div>

<div id="hud">
  <div id="enemy"></div>
  <div id="round"></div>
  <div class="pipRow"><span id="pips"></span><span class="pipSep" id="pipSep"> | </span><span id="epips"></span></div>
  <div id="discState"></div>
</div>
<div id="boostWrap"><div id="boostFill"></div></div>
<div id="crosshair">+</div>
<div id="hint"></div>
<div id="flash"></div>

<div id="touchUI" data-mode="">
  <div class="tbtn disc t-throw" data-cmd="throw" data-label="touchThrow"></div>
  <div class="tbtn disc t-guard" data-cmd="guard" data-label="touchGuard"></div>
  <div class="tbtn disc t-dash" data-cmd="dash" data-label="touchDash"></div>
  <div class="tbtn cyc t-turnL" data-cmd="turnL" data-label="touchTurnL"></div>
  <div class="tbtn cyc t-turnR" data-cmd="turnR" data-label="touchTurnR"></div>
  <div class="tbtn cyc t-boost" data-cmd="boost" data-label="touchBoost"></div>
  <div class="tbtn cyc t-brake" data-cmd="brake" data-label="touchBrake"></div>
  <div class="tbtn t-pause" data-cmd="pause" data-label="touchPause"></div>
</div>

<canvas id="minimap" width="256" height="256"></canvas>
<div id="dev"></div>
<script type="module" src="./assets/js/main.js"></script>
</body>
</html>
